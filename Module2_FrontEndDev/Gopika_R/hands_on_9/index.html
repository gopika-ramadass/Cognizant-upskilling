     type="button", or added role="button" with tabIndex={0} and keyboard event handlers.

5. [Violation] Navigation landmark missing descriptive ARIA label.
   - Fix: Added aria-label="Main navigation" to <nav> and aria-current="page" to active link.

6. [Violation] Dynamic content updates not announced to screen readers.
   - Fix: Added role="status" and aria-live="polite" to live search results counter.
